services:
  bot:
    build: .
    env_file:
      - .env
    volumes:
      - ./events.db:/app/data/events.db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import os; exit(0 if os.path.isfile('/app/data/events.db') else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
